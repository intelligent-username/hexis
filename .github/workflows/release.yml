name: Build and Release

on:
  push:
    branches:
      - main
    paths:
      - 'CHANGELOG.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from CHANGELOG
        id: version
        run: |
          VERSION=$(grep -m1 -E '^## [0-9]+\.[0-9]+\.[0-9]+' CHANGELOG.md | sed -E 's/## ([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          if [ -z "$VERSION" ]; then
            echo "Could not extract version from CHANGELOG.md" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists. Skipping release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 21
        if: steps.version.outputs.skip != 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Setup Gradle
        if: steps.version.outputs.skip != 'true'
        uses: gradle/actions/setup-gradle@v4

      - name: Compile release APK
        if: steps.version.outputs.skip != 'true'
        run: ./gradlew assembleFossRelease

      - name: Locate APK
        if: steps.version.outputs.skip != 'true'
        id: apk
        run: |
          APK=$(find androidApp/build/outputs/apk -name '*release*.apk' -type f | head -1)
          echo "path=$APK" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$APK")" >> "$GITHUB_OUTPUT"

      - name: Rename APK
        if: steps.version.outputs.skip != 'true'
        run: cp "${{ steps.apk.outputs.path }}" "Hexis.apk"

      - name: Create Release
        if: steps.version.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create \
            "v${{ steps.version.outputs.version }}" \
            "Hexis.apk" \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes
